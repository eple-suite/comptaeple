# =====================================================================
# CI — Diagnostic financier EPLE (recette de non-régression)
# ---------------------------------------------------------------------
# Exécute la recette complète à chaque push et chaque pull request,
# génère un rapport HTML + JSON consolidé et l'attache en artefact.
#
# Conformité : M9-6 tomes 3 & 4 art. 43231, Op@le pièce 14.
# =====================================================================

name: Diagnostic financier — Recette CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recette:
    name: Recette diagnostic financier (rapport HTML + JSON)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Génération du rapport de recette (orchestrateur)
        id: rapport
        run: npm run report:ci

      - name: Tests unitaires Vitest (complément)
        if: always()
        run: npm test -- --reporter=verbose

      - name: Upload du rapport (HTML + JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-recette-diagnostic-${{ github.run_number }}
          path: |
            reports/ci-report.html
            reports/ci-report.json
          retention-days: 90
          if-no-files-found: error

      - name: Résumé du run dans la synthèse GitHub
        if: always()
        run: |
          if [ -f reports/ci-report.json ]; then
            node -e "
              const r = require('./reports/ci-report.json');
              const lignes = [
                '# Rapport de recette — Diagnostic financier EPLE',
                '',
                r.success ? '✅ **Recette validée** — aucune régression.' : '❌ **Recette en échec** — voir l\'artefact.',
                '',
                '| Indicateur | Valeur |',
                '|---|---|',
                '| Étapes OK | ' + r.totaux.etapesOk + ' / ' + r.etapes.length + ' |',
                '| Assertions OK | ' + r.totaux.assertionsOk + ' / ' + r.totaux.assertions + ' |',
                '| Durée totale | ' + (r.totaux.dureeMs / 1000).toFixed(1) + ' s |',
                '| Commit | \`' + (r.git.sha || 'local').slice(0,8) + '\` |',
                '',
                '## Détail par étape',
                '',
                '| Catégorie | Étape | Statut | Assertions | Exit |',
                '|---|---|---|---|---|',
                ...r.etapes.map(e =>
                  '| ' + e.categorie + ' | ' + e.titre + ' | ' +
                  (e.success ? '✅' : '❌') + ' | ' +
                  e.assertions.ok + '/' + (e.assertions.ok + e.assertions.ko) + ' | ' +
                  e.exitCode + ' |'
                ),
                '',
                '> 📎 Rapport HTML complet disponible en artefact \`rapport-recette-diagnostic-${{ github.run_number }}\`.',
              ].join('\n');
              require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, lignes);
            "
          fi
